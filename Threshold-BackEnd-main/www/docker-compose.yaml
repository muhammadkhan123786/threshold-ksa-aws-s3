version: "3.8"

services:
    frontend:
        image: emadcapitalcloudsa/threshold-stg:frontend
        platform: linux/amd64
        ports:
            - "${FRONTEND_PORT}:80"
        env_file:
            - .env
        depends_on:
            backend:
                condition: service_healthy
        restart: always
        healthcheck:
            test:
                [
                    "CMD",
                    "curl",
                    "-f",
                    "http://localhost:${FRONTEND_PORT}/api/health",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "5"

    backend:
        image: emadcapitalcloudsa/threshold-stg:backend
        platform: linux/amd64
        ports:
            - "${BACKEND_PORT}:5000"
        env_file:
            - .env
        restart: on-failure
        healthcheck:
            test:
                ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT}/api/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        logging:
            driver: json-file
            options:
                max-size: "10m"
                max-file: "5"
        volumes:
            - ./logs:/app/logs

networks:
    default:
        name: threshold-network
        driver: bridge
