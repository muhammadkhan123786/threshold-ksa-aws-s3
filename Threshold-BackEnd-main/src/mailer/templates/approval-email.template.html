<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Account Approval</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                background-color: #f4f4f4;
            }
            .container {
                width: 100%;
                max-width: 600px;
                margin: 20px auto;
                padding: 20px;
                background-color: #ffffff;
                box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
                border-radius: 8px;
            }
            .header {
                text-align: center;
                padding: 20px 0;
                background-color: #c0d330;
                border-top-left-radius: 8px;
                border-top-right-radius: 8px;
                color: #ffffff;
                font-size: 24px;
                font-weight: bold;
            }
            .header img {
                max-width: 150px;
            }
            .content {
                padding: 20px;
                text-align: center;
            }
            .content p {
                font-size: 16px;
                color: #333333;
                margin: 0 0 20px;
            }
            .content a {
                display: inline-block;
                padding: 5px 5px;
                margin-top: 20px;
                background-color: #c0d330;
                color: #ffffff;
                text-decoration: none;
                border-radius: 5px;
                font-size: 16px;
                text-transform: uppercase;
            }
            .footer {
                text-align: center;
                padding: 20px;
                font-size: 14px;
                color: #ffffff;
                background-color: #c0d330;
                border-bottom-left-radius: 8px;
                border-bottom-right-radius: 8px;
            }
            .footer a {
                color: #ffffff;
                text-decoration: none;
            }
            .capitalize {
                text-transform: capitalize; /* Capitalizes first letter of each word */
            }

            .status {
                padding: 5px 5px;
                margin-top: 20px;
                background-color: #40a11a;
                color: #ffffff;
                text-transform: uppercase;
                border-bottom-left-radius: 8px;
                border-bottom-right-radius: 8px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">Threshold</div>
            <div class="content">
                <p>
                    Hello
                    <strong class="capitalize" style="color: #c0d330"
                        >{{userName}}</strong
                    >,
                </p>
                <p>
                    Your account has been
                    <strong class="status">{{status}}</strong>
                    by the admin.
                </p>
                <p>
                    You can now
                    <a href="{{frontURL}}">log in to your account</a> and start
                    using our services.
                </p>
                <p>Thank you for joining!</p>
            </div>
            <div class="footer">
                <p>
                    For any inquiries, please contact our support team at
                    <a href="mailto:info@thresholdsa.net"
                        >info@thresholdsa.net</a
                    >.
                </p>
            </div>
        </div>
    </body>
</html>
